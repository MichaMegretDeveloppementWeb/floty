<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:24px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px 28px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .lbl{font-size:11.5px;color:var(--slate-500);}
  .input{padding:8px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px;font-family:var(--font-sans);color:var(--slate-900);background:#fff;}
  .input.with-icon{padding-left:34px;}
  .search{position:relative;}
  .search .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--slate-400);display:inline-flex;}
  .search .ico svg{stroke-width:1.75;width:14px;height:14px;}
  .chev-ic{display:inline-flex;color:var(--slate-400);}
  .chev-ic svg{stroke-width:1.75;width:14px;height:14px;}
  .date svg{stroke-width:1.75;width:14px;height:14px;color:var(--slate-400);}
  .kbd-wrap{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:3px;}
  kbd{font-family:var(--font-mono);font-size:10px;padding:2px 6px;background:var(--slate-100);border:1px solid var(--slate-200);border-radius:4px;color:var(--slate-500);}
  .focus{border-color:var(--slate-400);box-shadow:0 0 0 3px #f1f5f9;}
  .select{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px;color:var(--slate-900);background:#fff;}
  .chev{color:var(--slate-400);}
  .date{display:flex;gap:8px;align-items:center;padding:8px 12px;border:1px solid var(--slate-200);border-radius:8px;font-size:13px;color:var(--slate-900);background:#fff;font-family:var(--font-mono);}
</style>
</head>
<body>
<div class="frame">
  <div class="field">
    <div class="lbl">Recherche globale</div>
    <div class="search">
      <span class="ico"><i data-lucide="search"></i></span>
      <input class="input with-icon" placeholder="Rechercher véhicule, entreprise…" style="width:100%;box-sizing:border-box;">
      <div class="kbd-wrap"><kbd>⌘</kbd><kbd>K</kbd></div>
    </div>
  </div>
  <div class="field">
    <div class="lbl">Immatriculation</div>
    <input class="input" value="EH-142-AZ" style="font-family:var(--font-mono);">
  </div>

  <div class="field">
    <div class="lbl">Focus (focus-ring)</div>
    <input class="input focus" value="Dacia Duster">
  </div>
  <div class="field">
    <div class="lbl">Select</div>
    <div class="select">ACME Industries <span class="chev-ic"><i data-lucide="chevron-down"></i></span></div>
  </div>

  <div class="field">
    <div class="lbl">Date de début</div>
    <div class="date"><i data-lucide="calendar-days"></i>21 avril 2026</div>
  </div>
  <div class="field">
    <div class="lbl">Erreur</div>
    <input class="input" value="SIREN invalide" style="border-color:var(--rose-600);box-shadow:0 0 0 3px var(--rose-50);color:var(--rose-700);">
  </div>
</div>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.75, width: 14, height: 14 } });</script>
</body>
</html>
