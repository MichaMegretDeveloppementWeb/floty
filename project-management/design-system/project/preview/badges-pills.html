<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Badges & pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:22px 28px;display:grid;grid-template-columns:120px 1fr;gap:16px 20px;align-items:center;}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--slate-500);letter-spacing:.04em;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .type{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;letter-spacing:.08em;}
  .vp{background:var(--slate-100);color:var(--slate-600);}
  .vu{background:var(--amber-50);color:var(--amber-700);}
  .status{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:9999px;border:1px solid;font-size:11px;font-weight:500;}
  .s-draft{background:var(--amber-50);color:var(--amber-700);border-color:var(--amber-200);}
  .s-ready{background:var(--blue-50);color:var(--blue-700);border-color:var(--blue-200);}
  .s-sent{background:var(--emerald-50);color:var(--emerald-700);border-color:var(--emerald-200);}
  .s-off{background:var(--slate-100);color:var(--slate-600);border-color:var(--slate-200);}
  .reco{padding:2px 9px;border-radius:9999px;background:var(--emerald-50);color:var(--emerald-700);border:1px solid var(--emerald-200);font-size:11px;font-weight:500;}
  .co{display:inline-flex;align-items:center;gap:7px;padding:3px 9px 3px 3px;border-radius:9999px;border:1px solid var(--slate-200);font-size:11.5px;color:var(--slate-700);}
  .co .dot{width:18px;height:18px;border-radius:50%;color:#fff;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div class="frame">
  <div class="label">Vehicle type</div>
  <div class="row"><span class="type vp">VP</span><span class="type vu">VU</span></div>

  <div class="label">Declaration</div>
  <div class="row">
    <span class="status s-draft">Brouillon</span>
    <span class="status s-ready">Prête</span>
    <span class="status s-sent">Envoyée</span>
  </div>

  <div class="label">Recommended</div>
  <div class="row"><span class="reco">Recommandé</span></div>

  <div class="label">Company tag</div>
  <div class="row">
    <span class="co"><span class="dot" style="background:#4f46e5;">AC</span>ACME</span>
    <span class="co"><span class="dot" style="background:#059669;">NW</span>Nordwell</span>
    <span class="co"><span class="dot" style="background:#ea580c;">CC</span>Cedar</span>
  </div>

  <div class="label">Inactive</div>
  <div class="row"><span class="status s-off">Désactivée</span></div>
</div>
</body>
</html>
