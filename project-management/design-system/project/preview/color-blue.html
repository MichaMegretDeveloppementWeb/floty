<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Blue scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:24px 28px;}
  .row{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;}
  .swatch{height:74px;border-radius:8px;border:1px solid rgba(15,23,42,.06);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
  .hex{font-family:var(--font-mono);font-size:9.5px;}
  .num{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.04em;}
  .title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);margin-bottom:10px;}
</style>
</head>
<body>
<div class="frame">
  <div class="title">Blue — interactive · heatmap</div>
  <div class="row">
    <div class="swatch" style="background:#eff6ff"><div class="num" style="color:#1e3a8a">50</div><div class="hex" style="color:#3b82f6">#eff6ff</div></div>
    <div class="swatch" style="background:#dbeafe"><div class="num" style="color:#1e3a8a">100</div><div class="hex" style="color:#1d4ed8">#dbeafe</div></div>
    <div class="swatch" style="background:#bfdbfe"><div class="num" style="color:#1e3a8a">200</div><div class="hex" style="color:#1d4ed8">#bfdbfe</div></div>
    <div class="swatch" style="background:#93c5fd"><div class="num" style="color:#1e3a8a">300</div><div class="hex" style="color:#1e40af">#93c5fd</div></div>
    <div class="swatch" style="background:#60a5fa"><div class="num" style="color:#fff">400</div><div class="hex" style="color:rgba(255,255,255,.85)">#60a5fa</div></div>
    <div class="swatch" style="background:#3b82f6"><div class="num" style="color:#fff">500</div><div class="hex" style="color:rgba(255,255,255,.85)">#3b82f6</div></div>
    <div class="swatch" style="background:#2563eb"><div class="num" style="color:#fff">600</div><div class="hex" style="color:rgba(255,255,255,.8)">#2563eb</div></div>
    <div class="swatch" style="background:#1d4ed8"><div class="num" style="color:#fff">700</div><div class="hex" style="color:rgba(255,255,255,.75)">#1d4ed8</div></div>
    <div class="swatch" style="background:#1e40af"><div class="num" style="color:#fff">800</div><div class="hex" style="color:rgba(255,255,255,.7)">#1e40af</div></div>
    <div class="swatch" style="background:#1e3a8a"><div class="num" style="color:#fff">900</div><div class="hex" style="color:rgba(255,255,255,.65)">#1e3a8a</div></div>
    <div class="swatch" style="background:#172554"><div class="num" style="color:#fff">950</div><div class="hex" style="color:rgba(255,255,255,.6)">#172554</div></div>
  </div>
</div>
</body>
</html>
