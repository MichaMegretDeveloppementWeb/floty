<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — KPI card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;font-family:var(--font-sans);}
  .frame{padding:22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;align-items:stretch;}
  .kpi{background:#fff;border:1px solid var(--border-1);border-radius:12px;padding:18px 22px;display:flex;flex-direction:column;gap:10px;}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);line-height:1.35;text-wrap:balance;}
  .line{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
  .val{font-size:28px;font-weight:600;color:var(--slate-900);letter-spacing:-.01em;line-height:1;}
  .suf{font-size:14px;color:var(--slate-400);}
  .trend{margin-left:6px;font-size:11.5px;font-weight:500;}
  .trend.up{color:var(--emerald-600);}
  .cap{font-size:12px;color:var(--slate-500);line-height:1.4;text-wrap:pretty;}
</style>
</head>
<body>
<div class="frame">
  <div class="kpi">
    <div class="lbl">Taux d'occupation moyen</div>
    <div class="line"><div class="val">68 %</div><div class="trend up">+4,2 %</div></div>
    <div class="cap">Semaine en cours · moyenne des 100 véhicules</div>
  </div>
  <div class="kpi">
    <div class="lbl">Véhicules actifs</div>
    <div class="line"><div class="val">97</div><div class="suf">/ 100</div></div>
    <div class="cap">3 immobilisés pour maintenance</div>
  </div>
  <div class="kpi">
    <div class="lbl">Entreprises utilisatrices</div>
    <div class="line"><div class="val">30</div></div>
    <div class="cap">8 actives cette semaine</div>
  </div>
  <div class="kpi">
    <div class="lbl">Taxes CO₂ + polluants estimées 2026</div>
    <div class="line"><div class="val">142 840 €</div><div class="trend up">+8,1 %</div></div>
    <div class="cap">vs 2025 consolidé sur 30 déclarations</div>
  </div>
</div>
</body>
</html>
