<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:22px 28px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .sem{border:1px solid var(--border-1);border-radius:10px;overflow:hidden;}
  .swatches{display:grid;grid-template-columns:repeat(3,1fr);}
  .sw{height:40px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;}
  .tag{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:500;border:1px solid;}
  .name{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);}
</style>
</head>
<body>
<div class="frame">
  <div class="sem">
    <div class="swatches">
      <div class="sw" style="background:var(--emerald-50);color:var(--emerald-700)">50</div>
      <div class="sw" style="background:var(--emerald-200);color:var(--emerald-700)">200</div>
      <div class="sw" style="background:var(--emerald-600);color:#fff">600</div>
    </div>
    <div class="tag">
      <div class="name">Emerald · succès</div>
      <span class="chip" style="background:var(--emerald-50);color:var(--emerald-700);border-color:var(--emerald-200);">● Envoyée</span>
    </div>
  </div>
  <div class="sem">
    <div class="swatches">
      <div class="sw" style="background:var(--amber-50);color:var(--amber-700)">50</div>
      <div class="sw" style="background:var(--amber-200);color:var(--amber-700)">200</div>
      <div class="sw" style="background:var(--amber-600);color:#fff">600</div>
    </div>
    <div class="tag">
      <div class="name">Amber · warning · VU</div>
      <span class="chip" style="background:var(--amber-50);color:var(--amber-700);border-color:var(--amber-200);">● Brouillon</span>
    </div>
  </div>
  <div class="sem">
    <div class="swatches">
      <div class="sw" style="background:var(--rose-50);color:var(--rose-700)">50</div>
      <div class="sw" style="background:var(--rose-200);color:var(--rose-700)">200</div>
      <div class="sw" style="background:var(--rose-600);color:#fff">600</div>
    </div>
    <div class="tag">
      <div class="name">Rose · danger · todo</div>
      <span class="chip" style="background:var(--rose-50);color:var(--rose-700);border-color:var(--rose-200);">● À générer</span>
    </div>
  </div>
</div>
</body>
</html>
