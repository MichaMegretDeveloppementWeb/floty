<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:22px 28px;}
  .title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .tag{font-family:var(--font-mono);font-size:10.5px;color:var(--slate-500);width:60px;}
  .bar{height:12px;background:var(--slate-900);border-radius:2px;}
  .px{font-family:var(--font-mono);font-size:10.5px;color:var(--slate-400);}
</style>
</head>
<body>
<div class="frame">
  <div class="title">Spacing scale — 4 px base</div>
  <div class="row"><div class="tag">sp-1</div><div class="bar" style="width:4px;"></div><div class="px">4 px</div></div>
  <div class="row"><div class="tag">sp-2</div><div class="bar" style="width:8px;"></div><div class="px">8 px</div></div>
  <div class="row"><div class="tag">sp-3</div><div class="bar" style="width:12px;"></div><div class="px">12 px</div></div>
  <div class="row"><div class="tag">sp-4</div><div class="bar" style="width:16px;"></div><div class="px">16 px · default gap</div></div>
  <div class="row"><div class="tag">sp-5</div><div class="bar" style="width:20px;"></div><div class="px">20 px · card padding</div></div>
  <div class="row"><div class="tag">sp-6</div><div class="bar" style="width:24px;"></div><div class="px">24 px · card padding large</div></div>
  <div class="row"><div class="tag">sp-8</div><div class="bar" style="width:32px;"></div><div class="px">32 px</div></div>
  <div class="row"><div class="tag">sp-10</div><div class="bar" style="width:40px;"></div><div class="px">40 px · main gutter</div></div>
</div>
</body>
</html>
