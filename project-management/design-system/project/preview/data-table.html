<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Data table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;font-family:var(--font-sans);}
  .frame{padding:18px 22px;}
  .card{background:#fff;border:1px solid var(--border-1);border-radius:12px;overflow:hidden;}
  table{width:100%;font-size:13px;border-collapse:collapse;}
  thead tr{background:rgba(248,250,252,.6);border-bottom:1px solid var(--slate-200);}
  th{text-align:left;padding:10px 18px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);}
  th.r{text-align:right;}
  tbody tr{border-bottom:1px solid var(--slate-100);}
  td{padding:11px 18px;color:var(--slate-700);}
  td.r{text-align:right;font-family:var(--font-mono);}
  .plate{font-family:var(--font-mono);font-weight:500;color:var(--slate-900);}
  .vp{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.08em;background:var(--slate-100);color:var(--slate-600);}
  .vu{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.08em;background:var(--amber-50);color:var(--amber-700);}
  .bar{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
  .barback{width:72px;height:5px;background:var(--slate-100);border-radius:9999px;overflow:hidden;}
  .barfill{height:100%;background:var(--slate-900);}
  .pct{font-family:var(--font-mono);font-size:11.5px;color:var(--slate-600);width:36px;text-align:right;}
</style>
</head>
<body>
<div class="frame">
  <div class="card">
    <table>
      <thead><tr>
        <th>Immatriculation</th><th>Modèle</th><th>Type</th><th class="r">CO₂</th><th class="r">Occup. 2026</th>
      </tr></thead>
      <tbody>
        <tr><td class="plate">EH-142-AZ</td><td>Peugeot 308</td><td><span class="vp">VP</span></td><td class="r">112 g/km</td><td class="r"><div class="bar"><div class="barback"><div class="barfill" style="width:62%"></div></div><div class="pct">62 %</div></div></td></tr>
        <tr><td class="plate">EL-887-KB</td><td>Renault Clio</td><td><span class="vp">VP</span></td><td class="r">95 g/km</td><td class="r"><div class="bar"><div class="barback"><div class="barfill" style="width:44%"></div></div><div class="pct">44 %</div></div></td></tr>
        <tr><td class="plate">FA-221-MX</td><td>Citroën Berlingo</td><td><span class="vu">VU</span></td><td class="r">138 g/km</td><td class="r"><div class="bar"><div class="barback"><div class="barfill" style="width:81%"></div></div><div class="pct">81 %</div></div></td></tr>
        <tr><td class="plate">EN-554-PQ</td><td>Tesla Model 3</td><td><span class="vp">VP</span></td><td class="r">0 g/km</td><td class="r"><div class="bar"><div class="barback"><div class="barfill" style="width:28%"></div></div><div class="pct">28 %</div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
