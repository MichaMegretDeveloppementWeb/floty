<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;font-family:var(--font-sans);}
  .frame{display:flex;align-items:stretch;gap:36px;padding:28px 32px;}
  .spot{flex:1;background:#fff;border:1px solid var(--border-1);border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:14px;min-height:140px;}
  .spot.dark{background:var(--slate-900);border-color:var(--slate-900);}
  .lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);text-align:center;}
  .lbl.on-dark{color:var(--slate-400);}
  .sub{font-size:10.5px;color:var(--slate-400);text-align:center;margin-top:-6px;}
  .sub.on-dark{color:var(--slate-500);}
  .mark-xl{width:72px;height:72px;}
  .brandline{display:flex;align-items:center;gap:10px;}
  .brand-txt{font-size:24px;font-weight:600;letter-spacing:-.01em;color:var(--slate-900);}
  .brand-txt.on-dark{color:#fff;}
</style>
</head>
<body>
<div class="frame">

  <div class="spot">
    <img src="../assets/floty-mark.svg" class="mark-xl" alt="">
    <div>
      <div class="lbl">Mark · 72</div>
      <div class="sub">Pool partagé · 3 entités utilisatrices</div>
    </div>
  </div>

  <div class="spot">
    <div class="brandline">
      <img src="../assets/floty-mark.svg" style="width:36px;height:36px;">
      <div class="brand-txt">Floty</div>
    </div>
    <div>
      <div class="lbl">Lockup horizontal</div>
      <div class="sub">DM Sans 600 · tracking −1 %</div>
    </div>
  </div>

  <div class="spot dark">
    <img src="../assets/floty-mark-ondark.svg" style="width:56px;height:56px;" alt="">
    <div>
      <div class="lbl on-dark">On dark</div>
      <div class="sub on-dark">Blanc + bleu · fond slate-900</div>
    </div>
  </div>

</div>
</body>
</html>
