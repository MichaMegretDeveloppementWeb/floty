<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#f8fafc;font-family:var(--font-sans);}
  .frame{padding:30px 28px;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:110px;height:72px;background:#fff;border:1px solid var(--border-1);border-radius:10px;}
  .name{font-size:11px;font-weight:600;color:var(--slate-700);}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--slate-500);text-align:center;line-height:1.4;}
</style>
</head>
<body>
<div class="frame">
  <div class="cell">
    <div class="box"></div>
    <div class="name">Rest</div>
    <div class="val">1 px border · no shadow</div>
  </div>
  <div class="cell">
    <div class="box" style="box-shadow:0 1px 2px 0 rgba(15,23,42,.05);"></div>
    <div class="name">sm · hover</div>
    <div class="val">cards at rest hover</div>
  </div>
  <div class="cell">
    <div class="box" style="box-shadow:0 4px 8px -2px rgba(15,23,42,.06),0 2px 3px -1px rgba(15,23,42,.04);"></div>
    <div class="name">md</div>
    <div class="val">popovers · menus</div>
  </div>
  <div class="cell">
    <div class="box" style="box-shadow:0 10px 20px -6px rgba(15,23,42,.12),0 4px 8px -4px rgba(15,23,42,.06);"></div>
    <div class="name">lg</div>
    <div class="val">floating panels</div>
  </div>
  <div class="cell">
    <div class="box" style="box-shadow:0 16px 28px -10px rgba(15,23,42,.22),0 6px 12px -6px rgba(15,23,42,.10);"></div>
    <div class="name">2xl · overlay</div>
    <div class="val">drawers · modales<br>focalisé, pas diffus</div>
  </div>
</div>
</body>
</html>
