<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Company chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:24px 28px;}
  .title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);margin-bottom:14px;}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;}
  .cell{display:grid;grid-template-rows:40px 28px 14px;align-items:start;gap:7px;}
  .chip{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;}
  .label{font-size:11px;color:var(--slate-900);font-weight:500;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--slate-500);align-self:end;}
</style>
</head>
<body>
<div class="frame">
  <div class="title">Company chips · assigned per entity (never UI chrome)</div>
  <div class="row">
    <div class="cell"><div class="chip" style="background:#4f46e5;">AC</div><div class="label">ACME Industries</div><div class="hex">#4f46e5</div></div>
    <div class="cell"><div class="chip" style="background:#059669;">NW</div><div class="label">Nordwell</div><div class="hex">#059669</div></div>
    <div class="cell"><div class="chip" style="background:#d97706;">LC</div><div class="label">Latitude</div><div class="hex">#d97706</div></div>
    <div class="cell"><div class="chip" style="background:#e11d48;">MC</div><div class="label">Meridian</div><div class="hex">#e11d48</div></div>
    <div class="cell"><div class="chip" style="background:#7c3aed;">AS</div><div class="label">Alpha Services</div><div class="hex">#7c3aed</div></div>
    <div class="cell"><div class="chip" style="background:#0d9488;">BB</div><div class="label">Bastion BTP</div><div class="hex">#0d9488</div></div>
    <div class="cell"><div class="chip" style="background:#ea580c;">CC</div><div class="label">Cedar & Co</div><div class="hex">#ea580c</div></div>
    <div class="cell"><div class="chip" style="background:#0891b2;">DM</div><div class="label">Delta Maint.</div><div class="hex">#0891b2</div></div>
  </div>
</div>
</body>
</html>
