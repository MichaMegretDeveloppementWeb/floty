<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:22px 28px;display:grid;grid-template-columns:repeat(6,1fr);gap:18px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:#f1f5f9;border:1px solid #e2e8f0;}
  .name{font-size:11px;font-weight:600;color:var(--slate-700);}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--slate-500);}
</style>
</head>
<body>
<div class="frame">
  <div class="cell"><div class="box" style="border-radius:3px;"></div><div class="name">sm</div><div class="val">3 px · cellule</div></div>
  <div class="cell"><div class="box" style="border-radius:6px;"></div><div class="name">md</div><div class="val">6 px</div></div>
  <div class="cell"><div class="box" style="border-radius:8px;"></div><div class="name">lg · default</div><div class="val">8 px · bouton/input</div></div>
  <div class="cell"><div class="box" style="border-radius:12px;"></div><div class="name">xl</div><div class="val">12 px · grande carte</div></div>
  <div class="cell"><div class="box" style="border-radius:16px;"></div><div class="name">2xl</div><div class="val">16 px · modale</div></div>
  <div class="cell"><div class="box" style="border-radius:9999px;"></div><div class="name">full</div><div class="val">avatar · pill</div></div>
</div>
</body>
</html>
