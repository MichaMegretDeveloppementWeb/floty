<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Neutral scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:24px 28px;}
  .row{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
  .swatch{height:74px;border-radius:8px;border:1px solid rgba(15,23,42,.06);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .hex{font-family:var(--font-mono);font-size:10px;}
  .num{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.04em;}
  .title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);margin-bottom:10px;}
</style>
</head>
<body>
<div class="frame">
  <div class="title">Slate — neutrals</div>
  <div class="row">
    <div class="swatch" style="background:#f8fafc"><div class="num" style="color:var(--slate-700)">50</div><div class="hex" style="color:var(--slate-500)">#f8fafc</div></div>
    <div class="swatch" style="background:#f1f5f9"><div class="num" style="color:var(--slate-700)">100</div><div class="hex" style="color:var(--slate-500)">#f1f5f9</div></div>
    <div class="swatch" style="background:#e2e8f0"><div class="num" style="color:var(--slate-700)">200</div><div class="hex" style="color:var(--slate-500)">#e2e8f0</div></div>
    <div class="swatch" style="background:#cbd5e1"><div class="num" style="color:var(--slate-700)">300</div><div class="hex" style="color:var(--slate-600)">#cbd5e1</div></div>
    <div class="swatch" style="background:#94a3b8"><div class="num" style="color:#fff">400</div><div class="hex" style="color:rgba(255,255,255,.8)">#94a3b8</div></div>
    <div class="swatch" style="background:#64748b"><div class="num" style="color:#fff">500</div><div class="hex" style="color:rgba(255,255,255,.8)">#64748b</div></div>
    <div class="swatch" style="background:#475569"><div class="num" style="color:#fff">600</div><div class="hex" style="color:rgba(255,255,255,.75)">#475569</div></div>
    <div class="swatch" style="background:#334155"><div class="num" style="color:#fff">700</div><div class="hex" style="color:rgba(255,255,255,.7)">#334155</div></div>
    <div class="swatch" style="background:#1e293b"><div class="num" style="color:#fff">800</div><div class="hex" style="color:rgba(255,255,255,.65)">#1e293b</div></div>
    <div class="swatch" style="background:#0f172a"><div class="num" style="color:#fff">900</div><div class="hex" style="color:rgba(255,255,255,.6)">#0f172a</div></div>
  </div>
</div>
</body>
</html>
