<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Floty — Heatmap density</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .frame{padding:24px 28px;}
  .title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-500);margin-bottom:14px;}
  .legend{display:flex;align-items:center;gap:6px;margin-bottom:20px;}
  .cell{width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:500;}
  .cap{font-size:11px;color:var(--slate-500);margin-left:8px;}
  .grid{display:flex;gap:2px;margin-top:4px;}
  .gc{width:20px;height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:500;}
  .grow{display:flex;gap:12px;align-items:center;margin-bottom:8px;}
  .plate{font-family:var(--font-mono);font-size:11px;color:var(--slate-700);width:90px;}
  .vpbadge{font-size:9px;font-weight:600;letter-spacing:.08em;padding:2px 5px;border-radius:4px;background:var(--slate-100);color:var(--slate-600);}
</style>
</head>
<body>
<div class="frame">
  <div class="title">Density heatmap · 0 → 7 jours/semaine</div>
  <div class="legend">
    <div class="cell" style="background:#fff;border:1px solid #e2e8f0;color:var(--slate-500);">0</div>
    <div class="cell" style="background:#eff6ff;border:1px solid #dbeafe;color:var(--slate-900);">1</div>
    <div class="cell" style="background:#dbeafe;border:1px solid #bfdbfe;color:var(--slate-900);">2</div>
    <div class="cell" style="background:#bfdbfe;border:1px solid #93c5fd;color:var(--slate-900);">3</div>
    <div class="cell" style="background:#93c5fd;border:1px solid #60a5fa;color:var(--slate-900);">4</div>
    <div class="cell" style="background:#3b82f6;border:1px solid #2563eb;color:#fff;">5</div>
    <div class="cell" style="background:#1d4ed8;border:1px solid #1e40af;color:#fff;">6</div>
    <div class="cell" style="background:#1e3a8a;border:1px solid #172554;color:#fff;">7</div>
    <div class="cap">jours utilisés / semaine — blanc → bleu très foncé</div>
  </div>

  <div class="grow">
    <span class="vpbadge">VP</span>
    <div class="plate">EH-142-AZ</div>
    <div class="grid">
      <div class="gc" style="background:#fff;border:1px solid #e2e8f0;"></div>
      <div class="gc" style="background:#eff6ff;border:1px solid #dbeafe;color:var(--slate-900);">1</div>
      <div class="gc" style="background:#dbeafe;border:1px solid #bfdbfe;color:var(--slate-900);">2</div>
      <div class="gc" style="background:#3b82f6;border:1px solid #2563eb;color:#fff;">5</div>
      <div class="gc" style="background:#bfdbfe;border:1px solid #93c5fd;color:var(--slate-900);">3</div>
      <div class="gc" style="background:#1e3a8a;border:1px solid #172554;color:#fff;">7</div>
      <div class="gc" style="background:#93c5fd;border:1px solid #60a5fa;color:var(--slate-900);">4</div>
      <div class="gc" style="background:#1d4ed8;border:1px solid #1e40af;color:#fff;">6</div>
      <div class="gc" style="background:#fff;border:1px solid #e2e8f0;"></div>
      <div class="gc" style="background:#eff6ff;border:1px solid #dbeafe;color:var(--slate-900);">1</div>
      <div class="gc" style="background:#dbeafe;border:1px solid #bfdbfe;color:var(--slate-900);">2</div>
      <div class="gc" style="background:#3b82f6;border:1px solid #2563eb;color:#fff;">5</div>
    </div>
  </div>
</div>
</body>
</html>
